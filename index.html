<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>振动计数器</title>
<!-- NoSleep.js：用隐藏循环静音 video 元素阻止 iOS / watchOS 自动锁屏。
     watchOS WebKit 是否生效未知，能加载就用，加载失败也不影响计数。 -->
<script src="https://cdn.jsdelivr.net/npm/nosleep.js@0.12.2/dist/NoSleep.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{--bg:#EDEAE0;--s:#FBFAF6;--s2:#F1EEE4;--bd:#E3DFD0;--bb:#D4CEBB;--ac:#BE5A38;--ac-soft:#D98E5C;--ac-wash:#F4E9E2;--mark:#46443A;--warn:#A0451C;--tx:#211F1A;--td:#57554B;--tm:#6E6C5E}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}

/* Header */
.hd{background:rgba(247,244,236,0.88);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.logo{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--ac);letter-spacing:2px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.logo-dot{width:7px;height:7px;background:var(--ac);border-radius:50%;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge{font-family:'JetBrains Mono',monospace;background:var(--ac);color:var(--s);font-size:12px;font-weight:700;padding:4px 14px;border-radius:100px;min-width:48px;text-align:center;transition:transform .1s}
.badge.pop{transform:scale(1.25)}

main{padding:0 0 24px}

/* 主计数卡片 */
.count-card{margin:14px 14px 10px;background:var(--s);border:1px solid #E6C9BB;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(40,30,20,.05)}
.count-header{background:var(--ac-wash);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.count-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--bb);transition:background .3s,box-shadow .3s}
.status-dot.active{background:var(--ac);box-shadow:0 0 6px rgba(190,90,56,.5);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.count-num{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;color:var(--ac);text-align:center;padding:14px 0 2px;line-height:1;transition:color .1s,transform .15s;cursor:pointer;user-select:none;-webkit-user-select:none}
.count-num:active{transform:scale(.93)}
.count-num.flash{color:#9A3F22}
.count-tap-hint{font-size:10px;color:var(--tm);text-align:center;font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding-bottom:2px;transition:opacity .3s}
.count-tap-hint.hidden{opacity:0}

.count-sub{font-size:11px;color:var(--td);text-align:center;padding-bottom:4px;font-family:'JetBrains Mono',monospace}

/* 快速计算按钮 */
.qcalc{display:grid;grid-template-columns:1fr 1fr;column-gap:6px;row-gap:5px;padding:8px 14px 12px}
.qc-btn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px 6px;color:var(--td);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;text-align:center;transition:color .15s,border-color .15s,background .15s,transform .1s;line-height:1.1;cursor:pointer;user-select:none;-webkit-user-select:none}
.qc-btn:active{transform:scale(.96)}
.qc-btn.active{color:var(--ac);border-color:#D99B7E;background:#F6E7DF;font-weight:700}

/* 加速度实时条 */
.accel-bar-wrap{padding:12px 14px 14px;border-top:1px solid var(--bd)}
.accel-bar-label{font-size:10px;color:var(--td);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;margin-bottom:6px}
.accel-bar-label span{color:var(--ac)}
.accel-track{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;position:relative}
.accel-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac-soft));border-radius:2px;width:0%;transition:width .1s}
.threshold-line{position:absolute;top:0;height:100%;width:2px;background:var(--mark);opacity:.8}
.accel-marks{position:relative;height:11px;margin-top:3px}
.accel-mark{position:absolute;top:0;transform:translateX(-50%);font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--tm);white-space:nowrap}

/* 统计格 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);border-top:1px solid var(--bd)}
.stat-cell{background:var(--s);padding:10px 14px;text-align:center}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--tx)}
.stat-key{font-size:10px;color:var(--td);margin-top:2px}

/* 设置折叠区 */
.sec{margin:0 14px 10px;background:var(--s);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.sh{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--s2);user-select:none}
.st{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--td);letter-spacing:.8px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.st .d{width:5px;height:5px;border-radius:50%}
.ch{color:var(--tm);transition:transform .25s;font-size:10px}.ch.open{transform:rotate(180deg)}
.sb{padding:14px;display:none}.sb.open{display:block}
.pr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}.pr:last-child{margin-bottom:0}
.pl{font-size:12px;color:var(--td);flex:1;line-height:1.4}
.pl strong{display:block;color:var(--tx);font-size:13px;font-weight:500;margin-bottom:1px}
.pc{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pv{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac);min-width:42px;text-align:right}
input[type="range"]{-webkit-appearance:none;width:110px;height:3px;background:var(--bb);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--ac);border-radius:50%;cursor:pointer}

/* iOS 权限区 */
.perm-box{margin:0 14px 10px;background:var(--s);border:1px dashed var(--bb);border-radius:12px;padding:18px 16px;text-align:center;display:none}
.perm-box.show{display:block}
.perm-icon{font-size:28px;margin-bottom:8px}
.perm-txt{font-size:12px;color:var(--td);line-height:1.7;margin-bottom:12px}
.perm-btn{padding:10px 24px;background:var(--ac);border:none;border-radius:8px;color:var(--s);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px}

</style>
</head>
<body>
<header class="hd">
  <div class="logo"><div class="logo-dot"></div>Vibration·Counter</div>
  <div class="badge" id="topBadge">0</div>
</header>

<main>
  <!-- iOS 权限提示 -->
  <div class="perm-box" id="permBox">
    <div class="perm-icon">📱</div>
    <div class="perm-txt">iOS 设备需要授权访问<br>运动传感器才能检测振动</div>
    <button class="perm-btn" onclick="requestPerm()">授权传感器</button>
  </div>

  <!-- 主计数卡片 -->
  <div class="count-card">
    <div class="count-header">
      <span class="count-label">▸ Vibration Count</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="count-num" id="countNum" role="button" tabindex="0" aria-label="计数，点按归零">0</div>
    <div class="count-tap-hint" id="tapHint">点按数字开始检测</div>
    <div class="count-sub" id="countSub">等待启动...</div>

    <!-- 快算：点击后把 当前计数×系数 的结果显示在按钮内，再点还原为系数标签。
         2 / 4 / 8 / 63.6 均为用户自定义换算系数，无固定物理含义，可按需修改。 -->
    <div class="qcalc" id="qcalc">
      <button type="button" class="qc-btn" data-mul="2" data-label="×2" onclick="toggleQc(this)">×2</button>
      <button type="button" class="qc-btn" data-mul="4" data-label="×4" onclick="toggleQc(this)">×4</button>
      <button type="button" class="qc-btn" data-mul="8" data-label="×8" onclick="toggleQc(this)">×8</button>
      <button type="button" class="qc-btn" data-mul="63.6" data-label="×63.6" onclick="toggleQc(this)">×63.6</button>
    </div>

    <!-- 实时加速度条 -->
    <div class="accel-bar-wrap">
      <div class="accel-bar-label">
        <span>加速度</span>
        <span id="accelVal">0.00 m/s²</span>
      </div>
      <div class="accel-track">
        <div class="accel-fill" id="accelFill"></div>
        <div class="threshold-line" id="lowMarker" style="left:7%"></div>
        <div class="threshold-line" id="highMarker" style="left:100%"></div>
      </div>
      <div class="accel-marks">
        <span class="accel-mark" id="lowMark">下限</span>
        <span class="accel-mark" id="highMark">上限</span>
      </div>
    </div>

    <!-- 统计 -->
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-val" id="statMax">0.0</div><div class="stat-key">峰值 m/s²</div></div>
      <div class="stat-cell"><div class="stat-val" id="statRate">-</div><div class="stat-key">次/分钟</div></div>
      <div class="stat-cell"><div class="stat-val" id="statTime">00:00</div><div class="stat-key">计时</div></div>
    </div>
  </div>

  <!-- 设置 -->
  <div class="sec">
    <div class="sh" onclick="toggleSec('cfg')" role="button" tabindex="0" aria-expanded="true" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleSec('cfg');}">
      <span class="st"><span class="d" style="background:var(--ac)"></span>灵敏度设置</span>
      <span class="ch open" id="cfgCh">▾</span>
    </div>
    <div class="sb open" id="cfg">
      <div class="pr">
        <div class="pl">
          <strong>灵敏度</strong>
          低=需要大动作 / 高=轻微振动即触发
        </div>
        <div class="pc">
          <input type="range" min="1" max="10" value="10" id="sensSlider" oninput="onSensChange(this.value)">
          <span class="pv" id="sensVal">10</span>
        </div>
      </div>
      <div class="pr">
        <div class="pl">
          <strong>动作上限</strong>
          超过此强度视为大冲击，不计数；拉到顶=不限
        </div>
        <div class="pc">
          <input type="range" min="20" max="45" step="1" value="30" id="upperSlider" oninput="onUpperChange(this.value)">
          <span class="pv" id="upperVal">30</span>
        </div>
      </div>
      <div class="pr">
        <div class="pl">
          <strong>冷却时间</strong>
          两次计数的最小间隔；持续振动按此节奏计数
        </div>
        <div class="pc">
          <input type="range" min="100" max="1000" step="10" value="190" id="coolSlider" oninput="onCoolChange(this.value)">
          <span class="pv" id="coolVal">190ms</span>
        </div>
      </div>
      <div class="pr" style="margin-top:4px">
        <div class="pl"><strong>当前区间</strong>振动强度落在此区间内才计数</div>
        <div class="pc"><span class="pv" id="bandDisp">2.0 – 30 m/s²</span></div>
      </div>
    </div>
  </div>
</main>

<script>
// ── 状态 ──────────────────────────────────────────
let running = false;
let count = 0;
let peakVibration = 0;
let lastTrigger = 0;
let startTime = null;
let timerInterval = null;
let cooldown = 190;   // ms
let sensitivity = 10; // 1~10
let threshold = 2.0;  // m/s²，由 sensitivity 映射
let lastMotionTime = 0;       // 最近一次 devicemotion 时间戳
let stallWatchInterval = null; // 心跳看门狗：事件流挂起时自动重订阅
const STALL_MS = 3000;         // 超过这个时间没事件就认为挂起

// 高通滤波：维护缓慢基线吸收重力／朝向，只测偏离基线的振动量
let baseline = null;
let latestVibration = 0;
const BASELINE_ALPHA = 0.05;   // 基线 EMA 系数，越小基线越慢；真机可微调
let upperLimit = 30;           // 动作上限 m/s²；由「动作上限」滑块调整，达到 UPPER_MAX 时为不限
const UPPER_MAX = 45;          // 「动作上限」滑块顶端 = 不限
let lastTouchTime = 0;         // 最近一次触摸时间戳，用于触摸期间抑制计数
const TOUCH_GUARD_MS = 400;    // 触摸后多久内不计数
let paused = false;            // 长按数字暂停时为 true
let pausedAt = 0;              // 进入暂停的时间戳
const LONGPRESS_MS = 600;      // 长按判定阈值（ms）
let permissionGranted = false; // iOS 运动权限是否已授予
const STARTUP_PROBE_MS = 2500; // 启动后多久没收到事件就判定不支持
const dom = {};                // 热路径元素引用缓存，init 时填充

// 纯函数：给定上一基线与当前合成幅值，返回 [新基线, 振动量]
function highPassStep(prevBaseline, mag, alpha) {
  const nb = (prevBaseline === null) ? mag : prevBaseline + alpha * (mag - prevBaseline);
  return [nb, Math.abs(mag - nb)];
}
// 纯函数：振动量是否落在 [low, high] 计数区间内
function inBand(vibration, low, high) {
  return vibration >= low && vibration <= high;
}

// sensitivity → threshold 映射（1=20, 10=2）
function sensToThreshold(s) {
  return 22 - s * 2;
}

// ── UI 工具 ───────────────────────────────────────
function toggleSec(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById(id + 'Ch').classList.toggle('open');
}

function onSensChange(v) {
  sensitivity = parseInt(v);
  threshold = sensToThreshold(sensitivity);
  document.getElementById('sensVal').textContent = v;
  updateBandDisplay();
  updateBandMarkers();
}

function onCoolChange(v) {
  cooldown = parseInt(v);
  document.getElementById('coolVal').textContent = v + 'ms';
}

// 加速度条上的下限／上限两个标记 + 标签（条宽对应 0~30 m/s²）
function updateBandMarkers() {
  const lowPct = Math.min((threshold / 30) * 100, 100);
  document.getElementById('lowMarker').style.left = lowPct + '%';
  document.getElementById('lowMark').style.left = lowPct + '%';
  const hiLine = document.getElementById('highMarker');
  const hiMark = document.getElementById('highMark');
  if (upperLimit === Infinity) {
    hiLine.style.display = 'none';
    hiMark.style.display = 'none';
  } else {
    const hiPct = Math.min((upperLimit / 30) * 100, 100);
    hiLine.style.display = 'block';
    hiMark.style.display = 'block';
    hiLine.style.left = hiPct + '%';
    hiMark.style.left = hiPct + '%';
  }
}
// 设置面板「当前区间」文字
function updateBandDisplay() {
  const hi = (upperLimit === Infinity) ? '不限' : upperLimit;
  document.getElementById('bandDisp').textContent = threshold.toFixed(1) + ' – ' + hi + ' m/s²';
}
// 「动作上限」滑块回调
function onUpperChange(v) {
  const n = parseInt(v);
  upperLimit = (n >= UPPER_MAX) ? Infinity : n;
  document.getElementById('upperVal').textContent = (n >= UPPER_MAX) ? '不限' : n;
  updateBandDisplay();
  updateBandMarkers();
}

function resetCount() {
  count = 0;
  peakVibration = 0;
  startTime = running ? Date.now() : null;
  // 归零同时恢复所有快算按钮为默认态：取消激活、还原系数标签
  document.querySelectorAll('.qc-btn').forEach(b => {
    b.classList.remove('active');
    b.textContent = b.dataset.label;
  });
  updateCountUI(false);
  document.getElementById('statMax').textContent = '0.0';
  document.getElementById('statRate').textContent = '-';
  document.getElementById('statTime').textContent = '00:00';
}

function updateCountUI(flash) {
  const el = dom.countNum;
  el.textContent = count;
  dom.topBadge.textContent = count;
  if (flash) {
    el.classList.add('flash');
    dom.topBadge.classList.add('pop');
    setTimeout(() => { el.classList.remove('flash'); dom.topBadge.classList.remove('pop'); }, 150);
  }
}

// 快算按钮：点击 → 按钮文字变为 当前计数×系数 的快照值并高亮；
// 再点 → 还原为系数标签。第三次点击重新取当前 count 快照。
function toggleQc(btn) {
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    btn.textContent = btn.dataset.label;
  } else {
    btn.classList.add('active');
    const r = count * parseFloat(btn.dataset.mul);
    btn.textContent = Number.isInteger(r) ? r : r.toFixed(1);
  }
}

// state: 'running' | 'paused' | 'idle'
function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const sub = document.getElementById('countSub');
  const hint = document.getElementById('tapHint');
  dot.classList.toggle('active', state === 'running');
  hint.classList.remove('hidden');
  if (state === 'running') {
    sub.textContent = '检测中，等待振动...';
    hint.textContent = '点按归零 · 长按暂停';
  } else if (state === 'paused') {
    sub.textContent = '已暂停 · 长按数字恢复';
    hint.textContent = '点按归零 · 长按恢复';
  } else {
    sub.textContent = count > 0 ? `已记录 ${count} 次振动` : '等待启动...';
    hint.textContent = '点按数字开始检测';
  }
}

function updateTimer() {
  if (!startTime) return;
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  dom.statTime.textContent = m + ':' + s;
  // 次/分钟
  const mins = (Date.now() - startTime) / 60000;
  dom.statRate.textContent = mins > 0 ? (count / mins).toFixed(1) : '-';
}

// ── 传感器处理 ────────────────────────────────────
// devicemotion 在手机上可达 60Hz+，每次都直接改 DOM 会把主线程填满，
// 表现为点击屏幕延迟/无反应。把纯视觉更新合并到 rAF 每帧一次，
// 计数触发逻辑保持在事件回调里实时判断。
let rafPending = false;
let rafId = 0;
let peakDirty = false;

function flushMotionUI() {
  rafPending = false;
  rafId = 0;
  const pct = Math.min((latestVibration / 30) * 100, 100);
  dom.accelFill.style.width = pct + '%';
  dom.accelVal.textContent = latestVibration.toFixed(2) + ' m/s²';
  if (peakDirty) {
    peakDirty = false;
    dom.statMax.textContent = peakVibration.toFixed(1);
  }
}

function onMotion(e) {
  lastMotionTime = Date.now();
  const a = e.acceleration || e.accelerationIncludingGravity;
  if (!a) return;

  const x = a.x || 0, y = a.y || 0, z = a.z || 0;
  const mag = Math.sqrt(x * x + y * y + z * z);

  // 高通滤波：剥离重力／朝向，得到偏离基线的振动量
  const [nb, vibration] = highPassStep(baseline, mag, BASELINE_ALPHA);
  baseline = nb;
  latestVibration = vibration;

  if (running && !paused) {
    if (vibration > peakVibration) {
      peakVibration = vibration;
      peakDirty = true;
    }
    const now = Date.now();
    const touchClear = now - lastTouchTime > TOUCH_GUARD_MS;
    if (inBand(vibration, threshold, upperLimit) && touchClear && now - lastTrigger > cooldown) {
      lastTrigger = now;
      count++;
      updateCountUI(true);
      dom.countSub.textContent = `最新峰值 ${vibration.toFixed(1)} m/s²`;
    }
  }

  if (!rafPending) {
    rafPending = true;
    rafId = requestAnimationFrame(flushMotionUI);
  }
}

// ── 点击数字：硬恢复 + 归零 ────────────────────────────
// 息屏 / 后台回来后传感器流可能滞留旧帧，单独 resetCount 不够，
// 这里把所有易脏的中间状态一次清空，让点击屏幕「立刻回到干净起点」。
function tapCount() {
  // 1. 干掉任何还在排队的 rAF，避免下一帧用旧 latestVibration 覆盖显示
  if (rafId) {
    cancelAnimationFrame(rafId);
    rafId = 0;
  }
  rafPending = false;
  latestVibration = 0;
  peakDirty = false;
  // 2. 冷却时间戳设为当前时刻，避免归零时手指回弹被立刻计为第 1 次
  lastTrigger = Date.now();
  // 3. 加速度条 / 数值立刻归零，不等下一个 motion 事件
  document.getElementById('accelFill').style.width = '0%';
  document.getElementById('accelVal').textContent = '0.00 m/s²';
  // 4. 计数归零（顺带清快算按钮）
  resetCount();
  // 5. 重新订阅传感器流：未运行则启动（未授权先弹授权），运行中则强制重订阅把卡住的事件流踢活
  if (!running) {
    startOrRequest();
  } else {
    resubscribeMotion();
  }
}

// ── 屏幕保持唤醒 ─────────────────────────────────
// 多管齐下尝试阻止 watchOS / iOS 自动锁屏：
//   1. Screen Wake Lock API（标准方案，watchOS 实测无效，但 iOS Safari 有效）
//   2. AudioContext 静音振荡器（让页面进入"媒体活动"状态）
//   3. MediaSession 标记"正在播放"（强化媒体活动信号）
// 三个都得在 user gesture 之后调用，点击大数字进入 startListening 时刚好满足。
// 全部 try/catch 包住，任一不支持都静默忽略，不影响计数主流程。
let wakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  if (wakeLock) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* 静默 */ }
}

let audioCtx = null;
function startSilentAudio() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    if (!audioCtx) {
      audioCtx = new Ctx();
      const gain = audioCtx.createGain();
      gain.gain.value = 0.0001; // 几乎零增益，实际无声
      const osc = audioCtx.createOscillator();
      osc.frequency.value = 1; // 1Hz 次声波，扬声器也发不出
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
    }
    // 已存在但被系统挂起（切后台等）时恢复，而非提前返回
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  } catch (e) { /* 静默 */ }
}

function announceMediaActive() {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: '振动计数器',
      artist: 'Detecting'
    });
    navigator.mediaSession.playbackState = 'playing';
  } catch (e) { /* 静默 */ }
}

// NoSleep.js 实例（依赖外部脚本是否加载成功）
let noSleep = null;
function enableNoSleep() {
  try {
    if (!noSleep && typeof NoSleep !== 'undefined') {
      noSleep = new NoSleep();
    }
    if (noSleep) {
      const p = noSleep.enable();
      if (p && p.catch) p.catch(() => {});
    }
  } catch (e) { /* 静默 */ }
}

function keepScreenAwake() {
  acquireWakeLock();
  startSilentAudio();
  announceMediaActive();
  enableNoSleep();
}

// ── 启动 / 停止 ───────────────────────────────────
// iOS Safari / Android Chrome 在省电 / 后台 / 无交互时会静默掐掉 devicemotion 事件流，
// 手动 stop→start 能恢复的本质就是重新订阅。用心跳 watchdog 自动做这件事。
function resubscribeMotion() {
  window.removeEventListener('devicemotion', onMotion);
  window.addEventListener('devicemotion', onMotion);
  lastMotionTime = Date.now(); // 给宽限期
}

// iOS 13+ 需显式授权 DeviceMotion；判断是否还需授权
function needsPermission() {
  return typeof DeviceMotionEvent !== 'undefined'
      && typeof DeviceMotionEvent.requestPermission === 'function'
      && !permissionGranted;
}
// 启动入口：未授权先弹授权，已授权直接开始
function startOrRequest() {
  if (needsPermission()) requestPerm();
  else startListening();
}

function startListening() {
  window.addEventListener('devicemotion', onMotion);
  running = true;
  startTime = Date.now();
  lastMotionTime = Date.now();
  setStatus('running');
  keepScreenAwake(); // wake lock + 静音 audio + mediasession 多管齐下阻止熄屏
  timerInterval = setInterval(updateTimer, 500);
  // 每秒检查事件流是否被挂起；卡住就悄悄重订阅
  stallWatchInterval = setInterval(() => {
    if (!running) return;
    if (Date.now() - lastMotionTime > STALL_MS) {
      resubscribeMotion();
    }
  }, 1000);
  // 一次性探测：启动后约 2.5s 仍无任何 devicemotion 事件 → 提示设备不支持
  const probeStart = lastMotionTime;
  setTimeout(() => {
    if (running && lastMotionTime === probeStart) {
      document.getElementById('countSub').textContent = '此设备 / 浏览器不支持运动传感器';
    }
  }, STARTUP_PROBE_MS);
}


// ── 长按暂停 / 恢复 ───────────────────────────────
// 长按数字 = 暂停 / 恢复。暂停时停止计数与计时；devicemotion 监听保留，
// 使基线在暂停期间持续更新。
function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    pausedAt = Date.now();
    clearInterval(timerInterval);
    clearInterval(stallWatchInterval);
    setStatus('paused');
  } else {
    if (startTime) startTime += Date.now() - pausedAt; // 扣除暂停时长，使计时连续
    lastMotionTime = Date.now();
    timerInterval = setInterval(updateTimer, 500);
    stallWatchInterval = setInterval(() => {
      if (!running) return;
      if (Date.now() - lastMotionTime > STALL_MS) {
        resubscribeMotion();
      }
    }, 1000);
    setStatus('running');
  }
}

// 区分短按（归零）与长按（暂停 / 恢复）
let pressTimer = null;
let longPressed = false;
function pressStart() {
  longPressed = false;
  pressTimer = setTimeout(() => { longPressed = true; togglePause(); }, LONGPRESS_MS);
}
function pressEnd() {
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  if (!longPressed) tapCount();
}
function pressCancel() {
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
}

// ── iOS 权限 ──────────────────────────────────────
function requestPerm() {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(state => {
      if (state === 'granted') {
        permissionGranted = true;
        document.getElementById('permBox').classList.remove('show');
        if (!running) startListening();
      } else {
        alert('传感器权限被拒绝，无法检测振动。');
      }
    }).catch(err => alert('权限请求失败：' + err));
  }
}

// ── 初始化 ────────────────────────────────────────
(function init() {
  // 缓存热路径元素引用，避免每帧 / 每次计数重复 getElementById
  dom.accelFill = document.getElementById('accelFill');
  dom.accelVal  = document.getElementById('accelVal');
  dom.statMax   = document.getElementById('statMax');
  dom.statRate  = document.getElementById('statRate');
  dom.statTime  = document.getElementById('statTime');
  dom.countNum  = document.getElementById('countNum');
  dom.topBadge  = document.getElementById('topBadge');
  dom.countSub  = document.getElementById('countSub');

  // 设置初始阈值 / 区间显示
  onSensChange(10);
  onCoolChange(190);
  onUpperChange(30);

  // 检测 iOS 需要权限
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    document.getElementById('permBox').classList.add('show');
  }

  // 非 HTTPS / 无传感器环境提示
  if (window.isSecureContext === false) {
    document.getElementById('countSub').textContent = '⚠ 需在 HTTPS 页面才能访问传感器';
  }

  // 页面从后台/息屏回到前台：iOS 会挂起事件流，立即重订阅，
  // 首次 resubscribe 有时还拿不到事件，500ms 后兜底再试一次
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && running) {
      resubscribeMotion();
      keepScreenAwake(); // 切回前台时各种保活状态都已被系统释放，重新申请
      setTimeout(() => {
        if (running && Date.now() - lastMotionTime > 400) {
          resubscribeMotion();
        }
      }, 500);
    }
  });

  // BFCache 恢复（iOS 切换 tab / 返回等走 pageshow 而不是 visibilitychange）
  window.addEventListener('pageshow', () => {
    if (running) resubscribeMotion();
  });

  // 任意触摸即踢活：只要事件流停超 1s，就当是卡住并强制重订阅；
  // 同时记录触摸时间戳，用于触摸期间抑制误计数
  function noteTouch() {
    lastTouchTime = Date.now();
  }
  document.addEventListener('touchstart', () => {
    noteTouch();
    if (running && Date.now() - lastMotionTime > 1000) {
      resubscribeMotion();
    }
  }, { passive: true });
  document.addEventListener('touchend', noteTouch, { passive: true });

  // 主数字：短按 = 归零，长按 = 暂停 / 恢复
  const countNumEl = document.getElementById('countNum');
  countNumEl.addEventListener('touchstart', e => { e.preventDefault(); pressStart(); }, { passive: false });
  countNumEl.addEventListener('touchend', pressEnd);
  countNumEl.addEventListener('touchcancel', pressCancel);
  countNumEl.addEventListener('mousedown', pressStart);
  countNumEl.addEventListener('mouseup', pressEnd);
  countNumEl.addEventListener('mouseleave', pressCancel);
  // 键盘可达：Enter / Space 触发短按（归零）；长按暂停为指针专属手势
  countNumEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tapCount(); }
  });
})();
</script>
